{% extends 'base.html' %}

{% block content %}
<div class="card" style="grid-column: 1 / -1;">
    <h2>لوحة تحكم المدير</h2>
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
        <div class="card" style="flex: 1;">
            <h4>إجمالي الزيارات</h4>
            <p>15,200</p>
        </div>
        <div class="card" style="flex: 1;">
            <h4>عدد الأدوات</h4>
            <p>4</p>
        </div>
    </div>
    
    <h3>إدارة الأدوات</h3>
    <table style="width:100%; border-collapse: collapse;">
        <tr style="text-align: right;">
            <th>اسم الأداة</th>
            <th>الإجراءات</th>
        </tr>
        <tr>
            <td style="padding: 10px 0;">تشكيل النصوص العربية</td>
            <td>
                <button class="btn" style="padding: 5px 10px; font-size: 0.8em;">تعديل</button>
                <button class="btn" style="padding: 5px 10px; font-size: 0.8em; background: #ef4444;">حذف</button>
            </td>
        </tr>
    </table>
    <br>
    <a href="/add-tool" class="btn">+ إضافة أداة جديدة</a>
</div>
{% endblock %}
